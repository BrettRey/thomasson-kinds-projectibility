version: "1.0.1"
name: "Brett Reynolds House Style"
description: "LaTeX and writing conventions for linguistic typology papers"

# LaTeX conventions
latex:
  semantic_macros:
    rule: "Use semantic macros for all metalinguistic typography"
    macros:
      term:
        command: "\\term{}"
        rendering: "small caps"
        usage: "Concepts and categories being introduced or defined"
        example: "The notion of \\term{definiteness} is complex."
      mention:
        command: "\\mention{}"
        rendering: "italics"
        usage: "Words or expressions under discussion (body text)"
        example: "The determinative \\mention{the} is not always definite."
      mentionhead:
        command: "\\mentionhead{}"
        rendering: "angle brackets ⟨ ⟩"
        usage: "Mentions inside headings (\\section, \\subsection, etc.)"
        example: "\\subsection{The unstable case: \\mentionhead{folks}}"
        rationale: "Italics don't contrast in small-caps headings; angle brackets do"
      olang:
        command: "\\olang{}"
        rendering: "italics"
        usage: "Object language (foreign words, cited forms)"
        example: "German \\olang{der Hund} 'the dog'"
      enquote:
        command: "\\enquote{}"
        rendering: "locale-aware curly quotes"
        usage: "Actual quotations"
        example: "As \\enquote{going forward} spread in business English..."
    incorrect:
      - "Raw \\textit{word} instead of \\mention{} or \\term{}"
      - "\\mention{} inside a heading instead of \\mentionhead{}"
      - "Straight quotes or LaTeX backtick quotes instead of \\enquote{}"

  dashes:
    parenthetical:
      rule: "Use en dash with spaces for parenthetical asides"
      example: "the category is stable~-- within limits~-- across registers"
    range:
      rule: "Use en dash (no spaces) for ranges and relations"
      examples:
        - "2001--2025"
        - "pp.\\ 113--127"
        - "the form--function distinction"
    hyphen:
      rule: "Use hyphen only for compound modifiers"
      examples:
        - "corpus-based study"
        - "task-specific rubric"

  cross_linguistic_notation:
    rule: "Use subscripts to distinguish cross-linguistic from language-specific"
    cross_linguistic:
      marker: "\\textsubscript{\\Cross}"
      examples:
        - "\\textsc{subject}\\crossmark"
        - "\\textsc{topic}\\crossmark"
        - "\\textsc{noun}\\crossmark"
    language_specific:
      marker: "\\textsubscript{eng}, \\textsubscript{jpn}, etc."
      examples:
        - "\\textsc{subject}\\textsubscript{eng}"
        - "\\textsc{topic}\\textsubscript{jpn}"
    language_internal:
      marker: "\\textsubscript{$L$}"
      usage: "Generic reference without naming specific language"

  examples:
    package: "langsci-gb4e"
    no_exe_environment: true
    commands:
      simple: "\\ea ... \\z"
      subexamples: "\\ea \\ea ... \\ex ... \\z \\z"
      gloss: "\\gll ... \\\\ ... \\\\ \\glt ..."
    judgements:
      ungrammatical: "\\ungram{*sentence}"
      marginal: "\\marg{?sentence}"
      odd: "\\odd{\\#sentence}"

# Writing style
prose:
  contractions:
    rule: "preferred"
    rationale: "Makes prose more natural and readable"
    examples:
      - "don't"
      - "won't"
      - "can't"

  paragraph_length:
    target: 60
    max: 100
    rule: "Keep paragraphs under 100 words on average; aim for ~60"
    note: "Dense 200+ word paragraphs should be broken into 2-4 shorter units"

  avoid:
    throat_clearers:
      - "It is important to note that"
      - "It should be emphasized that"
      - "Clearly"
      - "Obviously"
    meta_commentary_labels:
      phrases:
        - "A note on X:..."
        - "A caveat on..."
        - "An aside on..."
        - "A word about..."
      rule: "Just say the thing directly or integrate into prose"
    corrective_framing:
      patterns:
        - "it isn't X; it's Y"
        - "it's not X but Y"
        - "this isn't about X — it's about Y"
        - "the point isn't X; the point is Y"
        - "not X but Y (as sentence frame)"
      rule: "State what something is. Don't define by negation. One correctio per paper maximum."
      note: "LLMs massively overuse this pattern. It sounds like a TED talk reveal."
    metacommentary_frames:
      phrases:
        - "A potential worry:"
        - "A related concern is"
        - "One might object that"
        - "It's worth noting that"
        - "An important point here is"
        - "It bears mentioning that"
        - "A further limitation:"
      rule: "Never announce an observation before making it. Delete the frame; state the fact."
    faux_coaching_structural_spine:
      rule: "Avoid LLM-style live coaching, structural-engineering metaphors, and aphoristic claims from absence. State the claim, evidence, and consequence directly."
      high_signal_phrases:
        - "Let me refine your claim"
        - "Let me refine your load-bearing claim"
        - "the one place I'd still push"
        - "because I think it matters"
        - "you're doing zero moves there"
        - "the gap is what's interesting"
        - "the tell is"
        - "content-clothes"
        - "the content isn't actually there"
        - "structural spine"
        - "pull one, and the other goes inert"
      related_banned_metaphors:
        - "load-bearing claim"
        - "load-bearing"
        - "doing the heavy lifting"
        - "do real work"
        - "does real work"
        - "did real work"
        - "doing real work"
        - "deserves the weight"
      replacement: "Make the substantive assertion in ordinary analytic prose. Name the missing premise, absent evidence, failed contrast, or unsupported inference."
    present_self_reference:
      rule: "Avoid 'the present' self-reference for Brett, his arguments, or his papers."
      patterns:
        - "the present author"
        - "the present paper"
        - "the present study"
        - "the present article"
        - "the present work"
        - "the present analysis"
        - "the present account"
        - "the present argument"
        - "the present proposal"
      replacement: "Use 'I', 'this paper', 'this article', 'the account', or the specific claim."
    paragraph_opener_cadence:
      rule: "Treat repeated paragraph openers that name the argumentative object rather than making the move as a cadence warning."
      trigger: "Distributional problem, not a per-sentence ban."
      severity: "warning"
      object_naming_threshold: 4
      the_x_is_y_threshold: 3
      examples:
        - "The claim..."
        - "The account..."
        - "The problem..."
        - "This objection..."
        - "The X is Y."
      allowed_uses:
        - "defining a term"
        - "protecting a needed contrast"
        - "marking a section-level pivot"
      note: "The sentence shape is often right: thesis first, evidence after, without throat-clearing. The problem is a noticeable cadence."
      replacement: "Keep thesis-first openings, but vary the rhythm before the pattern becomes noticeable."
    paragraph_headings:
      rule: "Never use \\paragraph{} headings"
      instead: "Use strong topic sentences and discourse markers"
    bold_labels:
      rule: "Avoid bold labels in prose for enumeration"
      example_wrong: "**Observation 1.** The first point..."
      example_right: "First, the diagnostic features must cluster..."
    hackneyed_adverbs:
      - "moreover"
      - "furthermore"
      - "nevertheless"
      - "however (sentence-initial)"
    strong_modals:
      rule: "Prefer should/would over must"
      example_wrong: "The features must cluster reliably"
      example_right: "The features should cluster reliably"
    coordinate_overuse:
      rule: "Prefer a gerund-participial adjunct to a flat 'X, and it/they Y' coordinate when the second conjunct shares the subject and only comments on or elaborates the first."
      trigger: "Distributional problem (the 'and it ... and it ...' cadence), not a per-sentence ban."
      severity: "warning"
      example_wrong: "One refinement decides how the filter is handled, and it turns on which effect is wanted."
      example_right: "One refinement decides how the filter is handled, turning on which effect is wanted."
      keep_coordinate_when:
        - "the second conjunct has a different subject (genuine coordination)"
        - "the verb is copular and an appositive noun phrase fits better ('a scale, a modelling choice')"
        - "the participle would dangle onto a nearer wrong nominal"
        - "the repetition is deliberate emphasis"
      note: "Do not overcorrect into the trailing '-ing' tic ('..., leading to', '..., allowing', '..., resulting in'), which is its own monotony. CGEL: gerund-participial clause as adjunct/supplement."

  prefer:
    direct_style:
      - "direct verbs"
      - "short clauses"
      - "active voice where appropriate"
    coordinators:
      items:
        - "and"
        - "but"
      note: "Simple coordinators over hackneyed adverbs"
    ordinal_markers:
      sequence:
        - "first"
        - "second"
        - "third"
      alternatives:
        - "one [concern]"
        - "another"
        - "a final [point]"
    discourse_markers:
      objections:
        - "A first objection concerns..."
        - "A second question asks..."
        - "A related worry..."
      illustrations:
        - "Consider first..."
        - "A second illustration..."
        - "The clearest case..."
    punctuation:
      clause_initial_pp_comma:
        rule: "Prefer a comma after a clause-initial preposition phrase when the PP frames the clause."
        example_wrong: "For HPC-style work in linguistics this implies a division of labour."
        example_right: "For HPC-style work in linguistics, this implies a division of labour."
        note: "Advisory style preference, not a linter rule; automatic detection would be noisy."
    technical_terms:
      projectibility_first_mentions:
        rule: "Projectibility is central to Brett's work but unfamiliar to most audiences; at first mention, usually add a brief gloss and a Goodman citation."
        default_gloss: "projectibility (what observing some features licenses us to predict about others; Goodman 1955)"
        latex_citation_key: "Goodman1955"
        note: "Audience-sensitive advisory rule. Specialist philosophy-of-science audiences may need less; linguistics, education, AI, or public audiences usually need more."
    concrete_before_abstract:
      rule: "Introduce technical apparatus with concrete examples or plain-language motivation"

# Citations (biblatex with natbib=true)
citations:
  parenthetical:
    command: "\\citep{key}"
    example: "\\citep{HuddlestonPullum2002}"
  textual:
    command: "\\textcite{key}"
    example: "\\textcite{Pullum2018}"
  multiple:
    command: "\\citep{key1,key2}"
    example: "\\citep{HuddlestonPullum2002,Pullum2018}"
  with_page:
    command: "\\citep[page]{key}"
    example: "\\citep[113--127]{HuddlestonPullum2002}"

# Document structure
document_structure:
  front_matter:
    keywords:
      default_in_seed: true
      visible_line: "\\noindent\\textbf{Keywords:} keyword one; keyword two; keyword three"
      pdf_metadata: "pdfkeywords={keyword one, keyword two, keyword three}"
      rule: "Every paper seed should include keywords by default. Keep the visible keyword line and PDF metadata in sync."
      visible_separator: "semicolon"
      metadata_separator: "comma"
      submission_note: "Replace TODO/generic placeholders before submission."

  references:
    before_printbibliography: "\\clearpage"
    rule: "Always put \\clearpage before \\printbibliography so references start on a fresh page after pending floats are flushed."

  sections:
    allowed:
      - "\\section{}"
      - "\\subsection{}"
    avoid:
      - "\\paragraph{}"
    note: "Keep subsections to substantial content (3+ paragraphs)"

  lists:
    use_for:
      - "hypothesis or prediction lists"
      - "linguistic examples (gb4e)"
      - "codebook entries"
    avoid_for:
      - "argumentative sequences (use prose with transitions)"
      - "objection-reply pairs (use discourse markers)"
      - "before/after contrasts (use narrative)"

  transitions:
    rule: "Use ordinal markers and discourse connectives for flow"
    sequence:
      - "first, second, third"
      - "one [concern], another, a final [point]"
    objections:
      - "A first objection concerns..."
      - "A second question..."
      - "Finally, does..."
    illustrations:
      - "Consider first..."
      - "A second illustration..."

# Dual-audience accessibility
accessibility:
  paragraph_length:
    average: 60
    rationale: "Shorter paragraphs improve readability across disciplines"

  parenthetical_glosses:
    rule: "Add brief functional explanations for technical terms"
    examples:
      - "latent variables (quantities representing unobserved category strength)"
      - "Spearman's ρ (a rank correlation measure)"
      - "differential object marking (where only some objects trigger case)"

  concrete_before_abstract:
    rule: "Introduce technical apparatus with concrete examples first"

# Comparanda terminology
comparanda:
  terminology:
    function: "syntactic functions only (unqualified)"
    target: "semantic targets"
    role: "discourse/pragmatic roles"
    category: "lexical categories or phrasal projections"
    class:
      rule: "Never use class as a synonym for category"
      use_for: "descriptive groupings whose mechanism-backed unity is unknown, mixed, or absent"
      prefer_category_for: "lexical categories and phrasal projections"
      avoid_as_category_synonyms:
        - "word class"
        - "lexical class"
        - "syntactic class"
        - "grammatical class"
        - "adjective class"
        - "noun class"
        - "verb class"
      allowed_fixed_uses:
        - "classifier"
        - "class-averaged F1"
        - "multi-class prediction"
        - "quoted or source terminology under discussion"

  mappings:
    note: "Remind readers that mappings between axes are rarely one-to-one"

# BibTeX conventions
bibtex:
  capital_protection:
    rule: "Protect capitals in proper nouns and first words after colons"
    protect:
      - "Proper nouns: {Cambridge}, {English}, {American}"
      - "First word after colon: {Syntactic}, {A}, {An}"
      - "Acronyms: {HPC}, {DOM}"
    dont_protect:
      - "Common nouns, adjectives, verbs (unless part of proper noun)"
      - "Title-initial words (BibTeX handles automatically)"
    examples:
      - "title = {The {Cambridge} Grammar of the {English} Language}"
      - "title = {Radical Construction Grammar: {Syntactic} Theory...}"

# Quarto / Pandoc Markdown conventions
# These map the LaTeX rules above to Quarto (.qmd) equivalents.
# Use when generating Reveal.js slides, Quarto HTML papers, or notebooks.
quarto:
  semantic_spans:
    rule: "Use Pandoc bracketed spans with CSS classes for all semantic typography"
    note: "Requires corresponding CSS classes in the project's SCSS theme (see .house-style/quarto-theme.scss)"
    spans:
      term:
        syntax: "[text]{.term}"
        css: "font-variant: small-caps"
        maps_to: "\\term{}"
        usage: "Concepts and categories being introduced or defined"
        example: "a [robust cluster]{.term} of co-occurring properties"
      mention:
        syntax: "[text]{.mention}"
        css: "font-style: italic"
        maps_to: "\\mention{}"
        usage: "Words or expressions under discussion"
        example: "the determinative [the]{.mention} is not always definite"
        note: "Do NOT use bare *italic* for mentions; use the span class"
      olang:
        syntax: "[text]{.olang}"
        css: "font-style: italic"
        maps_to: "\\olang{}"
        usage: "Object language (foreign words, cited forms)"
        example: "German [der Hund]{.olang} 'the dog'"
      thesis:
        syntax: "[text]{.thesis}"
        css: "background highlight box"
        maps_to: "n/a (slides only)"
        usage: "Thesis or takeaway statements on slides"
        example: "[Stable ambiguity is evidence of maintenance at work.]{.thesis}"
    incorrect:
      - "Bare *italic* instead of [text]{.mention} or [text]{.olang}"
      - "Raw HTML <em> or <i> instead of span classes"
      - "Inline style= attributes for semantic typography (use CSS classes)"

  quotations:
    rule: "Use standard double quotes; Pandoc smart-quotes handle curly rendering"
    correct: '"Outer with an "inner" quote"'
    note: "Pandoc converts straight quotes to curly automatically; no special macro needed"

  dashes:
    parenthetical:
      rule: "Use spaced en-dash for parenthetical asides"
      syntax: "text -- aside -- more text"
      note: "Pandoc converts -- to en-dash. Use spaces on both sides."
      example: "the category is stable -- within limits -- across registers"
    range:
      rule: "Use en-dash (no spaces) for ranges"
      syntax: "2001--2025"
      note: "Same as LaTeX: Pandoc converts -- to en-dash"
    hyphen:
      rule: "Regular hyphen for compounds"
      examples:
        - "corpus-based study"
        - "task-specific rubric"

  citations:
    note: "Requires bibliography: references.bib in YAML frontmatter"
    parenthetical:
      syntax: "[@key]"
      maps_to: "\\citep{key}"
    textual:
      syntax: "@key"
      maps_to: "\\textcite{key}"
    with_page:
      syntax: "[@key, p. 113]"
      maps_to: "\\citep[113]{key}"
    multiple:
      syntax: "[@key1; @key2]"
      maps_to: "\\citep{key1,key2}"

  smallcaps:
    syntax: "[text]{.smallcaps}"
    note: "Pandoc built-in class for small caps outside of .term spans"

  theme:
    file: ".house-style/quarto-theme.scss"
    note: "Import in YAML frontmatter: theme: [default, path/to/quarto-theme.scss]"
    provides:
      - ".term (small caps)"
      - ".mention (italic)"
      - ".olang (italic)"
      - ".thesis (highlight box)"
      - "House colour palette"
      - "EB Garamond font stack"

# Enforcement
enforcement:
  mode: "warning"  # warning, strict, or disabled
  auto_fix: false
  checks:
    - "semantic_macros"
    - "mention_in_headings"
    - "paragraph_headings"
    - "prohibited_phrases"
    - "cross_ling_notation"
